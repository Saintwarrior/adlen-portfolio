name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build (static export)
        env:
          NEXT_PUBLIC_SITE_URL: ${{ env.vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_BRIEF_ENDPOINT: ${{ env.vars.NEXT_PUBLIC_BRIEF_ENDPOINT }}
          STRAPI_URL: ${{ env.vars.STRAPI_URL }}
          STRAPI_TOKEN: ${{ env.secrets.STRAPI_TOKEN }}
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=adlen-portfolio --branch=main
